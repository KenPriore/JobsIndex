 "See How to Become One", "reasoning": "Physical operation of machinery. Automation advancing but not yet widespread.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/material-moving-machine-operators.htm", "color": "rgb(158,136,38)"}, {"name": "Bus Drivers", "value": 546100, "score": 3, "jobs": 546100, "pay": 48370, "outlook": 1, "education": "$63,140", "reasoning": "Physical operation of vehicles. Autonomous driving technology is advancing but not yet replacing most bus routes.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/bus-drivers.htm", "color": "rgb(158,136,38)"}, {"name": "Taxi Drivers, Shuttle Drivers, and Chauffeurs", "value": 447900, "score": 4, "jobs": 447900, "pay": 36660, "outlook": 9, "education": "$39,390", "reasoning": "Autonomous vehicle technology poses threat, but current work is physical driving.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/taxi-drivers-and-chauffeurs.htm", "color": "rgb(194,128,34)"}, {"name": "Airline and Commercial Pilots", "value": 155400, "score": 4, "jobs": 155400, "pay": 198100, "outlook": 4, "education": "See How to Become One", "reasoning": "Physical operation of aircraft. Automation handles much cruise flight but takeoff/landing and emergencies need humans.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/airline-and-commercial-pilots.htm", "color": "rgb(194,128,34)"}, {"name": "Flight Attendants", "value": 130800, "score": 2, "jobs": 130800, "pay": 67130, "outlook": 9, "education": "High school diploma or equivalent", "reasoning": "In-person safety and service aboard aircraft. Requires physical presence.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/flight-attendants.htm", "color": "rgb(122,144,42)"}, {"name": "Water Transportation Workers", "value": 84300, "score": 3, "jobs": 84300, "pay": 66490, "outlook": 1, "education": "See How to Become One", "reasoning": "Physical operation of watercraft.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/water-transportation-occupations.htm", "color": "rgb(158,136,38)"}, {"name": "Railroad Workers", "value": 77900, "score": 3, "jobs": 77900, "pay": 75680, "outlook": 1, "education": "$78,050", "reasoning": "Physical operation and maintenance of railroad equipment.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/railroad-occupations.htm", "color": "rgb(158,136,38)"}, {"name": "Air Traffic Controllers", "value": 24100, "score": 5, "jobs": 24100, "pay": 144580, "outlook": 1, "education": "Associate's degree", "reasoning": "Real-time coordination requiring intense focus. AI can assist but human oversight critical for safety.", "url": "https://www.bls.gov/ooh/transportation-and-material-moving/air-traffic-controllers.htm", "color": "rgb(230,120,30)"}]}]};
const STATS = {"total_jobs": 143066500, "weighted_avg": 4.4, "pay_stats": {"<$35K": 3.4, "$35-50K": 4.1, "$50-75K": 4.2, "$75-100K": 5.3, "$100K+": 6.1}, "edu_stats": {"No degree/HS": 3.9, "Postsec/Assoc": 4.5, "Bachelor's": 6.9, "Master's": 4.5, "Doctoral/Prof": 4.8}, "exposure_levels": {"Minimal (0-1)": {"jobs": 8636100, "count": 19}, "Low (2-3)": {"jobs": 51453800, "count": 87}, "Moderate (4-5)": {"jobs": 38269800, "count": 120}, "High (6-7)": {"jobs": 26475300, "count": 86}, "Very high (8-10)": {"jobs": 18231500, "count": 30}}, "legal": [{"name": "Court Reporters and Simultaneous Captioners", "score": 9, "jobs": 17700, "pay": 67310}, {"name": "Paralegals and Legal Assistants", "score": 9, "jobs": 376200, "pay": 61010}, {"name": "Lawyers", "score": 7, "jobs": 864800, "pay": 151160}, {"name": "Arbitrators, Mediators, and Conciliators", "score": 5, "jobs": 9100, "pay": 67710}, {"name": "Judges and Hearing Officers", "score": 5, "jobs": 44800, "pay": 135160}]};

// Populate sidebar
document.getElementById('total-jobs').textContent =
  (STATS.total_jobs / 1e6).toFixed(0) + 'M';
document.getElementById('avg-exposure').textContent = STATS.weighted_avg.toFixed(1);

// Histogram of exposure levels
const histEl = document.getElementById('histogram');
const maxJobs = Math.max(...Object.values(STATS.exposure_levels).map(v => v.jobs));
const levelColors = {
  "Minimal (0-1)": "#327832",
  "Low (2-3)": "#5a9832",
  "Moderate (4-5)": "#b8a030",
  "High (6-7)": "#c87828",
  "Very high (8-10)": "#c83828",
};

// Build histogram
let histHTML = '';
for (const [level, data] of Object.entries(STATS.exposure_levels)) {
  const pct = STATS.total_jobs > 0 ? Math.round(data.jobs / STATS.total_jobs * 100) : 0;
  const barWidth = maxJobs > 0 ? (data.jobs / maxJobs * 100) : 0;
  const jobsStr = (data.jobs / 1e6).toFixed(1) + 'M';
  histHTML += `
    <div class="hist-row">
      <span class="hist-label">${level}</span>
      <div class="hist-bar-container">
        <div class="hist-bar" style="width:${barWidth}%;background:${levelColors[level] || '#666'}"></div>
      </div>
      <span class="hist-value">${jobsStr}</span>
      <span class="hist-pct">${pct}%</span>
    </div>`;
}
histEl.innerHTML = histHTML;

// Pay stats
function renderBracketStats(containerId, statsObj) {
  const el = document.getElementById(containerId);
  let html = '';
  for (const [label, val] of Object.entries(statsObj)) {
    const barWidth = (val / 10) * 100;
    const t = val / 10;
    let r, g, b;
    if (t <= 0.5) {
      r = Math.round(50 + 180 * (t * 2));
      g = Math.round(160 - 40 * (t * 2));
      b = Math.round(50 - 20 * (t * 2));
    } else {
      r = Math.round(230 - 30 * ((t - 0.5) * 2));
      g = Math.round(120 - 100 * ((t - 0.5) * 2));
      b = 30;
    }
    const color = `rgb(${r},${g},${b})`;
    html += `<div class="bracket-row">
      <span class="bracket-label">${label}</span>
      <div class="bracket-bar-container">
        <div class="bracket-bar" style="width:${barWidth}%;background:${color}"></div>
      </div>
      <span class="bracket-value">${val}</span>
    </div>`;
  }
  el.innerHTML = html;
}

renderBracketStats('pay-stats', STATS.pay_stats);
renderBracketStats('edu-stats', STATS.edu_stats);

// Legal occupations spotlight
const legalEl = document.getElementById('legal-stats');
let legalHTML = '';
if (STATS.legal && STATS.legal.length > 0) {
  STATS.legal.forEach(occ => {
    const t = occ.score / 10;
    let r, g, b;
    if (t <= 0.5) {
      r = Math.round(50 + 180 * (t * 2));
      g = Math.round(160 - 40 * (t * 2));
      b = Math.round(50 - 20 * (t * 2));
    } else {
      r = Math.round(230 - 30 * ((t - 0.5) * 2));
      g = Math.round(120 - 100 * ((t - 0.5) * 2));
      b = 30;
    }
    const color = `rgb(${r},${g},${b})`;
    const jobsStr = occ.jobs >= 1e6 ? (occ.jobs / 1e6).toFixed(1) + 'M' : Math.round(occ.jobs / 1e3) + 'K';
    const payStr = occ.pay ? '$' + Math.round(occ.pay / 1000) + 'K' : '';
    legalHTML += `<div class="bracket-row" style="margin:4px 0">
      <span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${color};margin-right:6px;flex-shrink:0"></span>
      <span style="flex:1;font-size:11px;line-height:1.3">${occ.name}</span>
      <span style="width:35px;text-align:right;flex-shrink:0;font-weight:600;font-size:11px">${occ.score}/10</span>
    </div>
    <div style="font-size:10px;color:#777;margin-left:16px;margin-bottom:4px">${jobsStr} jobs${payStr ? ' · ' + payStr : ''}</div>`;
  });
  const totalLegalJobs = STATS.legal.reduce((a, o) => a + o.jobs, 0);
  const weightedLegalScore = STATS.legal.reduce((a, o) => a + o.score * o.jobs, 0) / totalLegalJobs;
  legalHTML += `<div style="border-top:1px solid #444;margin-top:8px;padding-top:6px;font-size:11px;color:#aaa">
    Weighted avg: <strong style="color:#fff">${weightedLegalScore.toFixed(1)}</strong> · ${(totalLegalJobs / 1e6).toFixed(1)}M jobs
  </div>`;
}
legalEl.innerHTML = legalHTML;

// Build treemap
const container = document.getElementById('treemap-container');
const width = container.clientWidth;
const height = container.clientHeight;

const root = d3.hierarchy(DATA)
  .sum(d => d.value || 0)
  .sort((a, b) => b.value - a.value);

d3.treemap()
  .size([width, height])
  .paddingOuter(3)
  .paddingTop(18)
  .paddingInner(1)
  .round(true)(root);

// Render category labels
root.children.forEach(cat => {
  const label = document.createElement('div');
  label.className = 'category-label';
  label.style.left = cat.x0 + 4 + 'px';
  label.style.top = cat.y0 + 2 + 'px';
  label.textContent = cat.data.name;
  container.appendChild(label);
});

// Render cells
const tooltip = document.getElementById('tooltip');
const leaves = root.leaves();

leaves.forEach(leaf => {
  const d = leaf.data;
  const w = leaf.x1 - leaf.x0;
  const h = leaf.y1 - leaf.y0;

  if (w < 2 || h < 2) return;

  const cell = document.createElement('div');
  cell.className = 'treemap-cell';
  cell.style.left = leaf.x0 + 'px';
  cell.style.top = leaf.y0 + 'px';
  cell.style.width = w + 'px';
  cell.style.height = h + 'px';
  cell.style.background = d.color || '#666';

  // Label
  if (w > 40 && h > 20) {
    const label = document.createElement('div');
    label.className = 'cell-label';
    let nameText = d.name;
    const maxChars = Math.floor(w / 6.5);
    if (nameText.length > maxChars) {
      nameText = nameText.substring(0, maxChars - 1) + '…';
    }
    label.innerHTML = nameText;
    if (w > 60 && h > 35) {
      const jobsStr = d.jobs >= 1e6 ? (d.jobs / 1e6).toFixed(1) + 'M jobs' : Math.round(d.jobs / 1e3) + 'K jobs';
      label.innerHTML += `<span class="cell-sublabel">${d.score}/10 &middot; ${jobsStr}</span>`;
    }
    cell.appendChild(label);
  }

  // Tooltip
  cell.addEventListener('mouseenter', (e) => {
    const payStr = d.pay ? '$' + d.pay.toLocaleString() : 'N/A';
    const jobsStr = d.jobs ? d.jobs.toLocaleString() : 'N/A';
    const outlookStr = d.outlook !== null && d.outlook !== undefined ? d.outlook + '% ' + (d.outlook >= 7 ? '(Much faster than average)' : d.outlook >= 4 ? '(Faster than average)' : d.outlook >= 1 ? '(As fast as average)' : d.outlook >= -1 ? '(Little or no change)' : '(Decline)') : 'N/A';

    tooltip.innerHTML = `
      <h3>${d.name}</h3>
      <div class="score-badge" style="background:${d.color};color:#fff">AI Exposure: ${d.score}/10</div>
      <div class="detail-grid">
        <span class="detail-label">Median pay</span><span class="detail-value">${payStr}</span>
        <span class="detail-label">Jobs (2024)</span><span class="detail-value">${jobsStr}</span>
        <span class="detail-label">Outlook</span><span class="detail-value">${outlookStr}</span>
        <span class="detail-label">Education</span><span class="detail-value">${d.education || 'N/A'}</span>
      </div>
      ${d.reasoning ? '<div class="reasoning">' + d.reasoning + '</div>' : ''}
    `;
    tooltip.style.display = 'block';
  });

  cell.addEventListener('mousemove', (e) => {
    let left = e.clientX + 16;
    let top = e.clientY + 16;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    if (left + tw > window.innerWidth - 10) left = e.clientX - tw - 16;
    if (top + th > window.innerHeight - 10) top = e.clientY - th - 16;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  });

  cell.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
  });

  container.appendChild(cell);
});

// Handle resize
window.addEventListener('resize', () => location.reload());
</script>
